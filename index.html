  <!-- Main CSS -->
  <link rel="preload" href="style.css" as="style" onload="this.rel='stylesheet'">

  <style>
    /* FULLSCREEN INVITATION */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
    }

.invitation-card {
  background-color: #000; /* fallback while image loads */
  background-image: url('assets/images/invitation.webp');
  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;

  height: 100vh;
  width: 100%;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  padding: 50px 20px 0 20px;
  position: relative;
  text-align: center;
  color: white;
}

.invitation-content {
  width: 100%; /* full width */
  max-width: none; /* remove previous max-width */
  padding: 25px 0; /* keep vertical padding, horizontal removed to span full width */
  background: rgba(0,0,0,0.35);
  border-radius: 0; /* remove rounded corners to fit full width */
  backdrop-filter: blur(5px);
  text-align: center;
  animation: fadeInDown 1.5s ease forwards;
}

    /* NAMES WITH DIVIDER */
    .invitation-names-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .invitation-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .invitation-divider .line {
      flex: 1;
      height: 2px;
      background: white;
    }

    .invitation-divider .amp {
      font-size: 2rem;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
    }

    .invitation-names {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .invitation-date {
      font-size: 1.2rem;
      margin: 25px 0;
      letter-spacing: 1px;
    }

.open-invitation {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px; /* space between icon and text */
  padding: 15px 45px;
  border-radius: 50px;
  background: linear-gradient(45deg, #c48b9f, #a35c73);
  color: white;
  text-decoration: none;
  font-size: 1.1rem;
  box-shadow: 0 15px 35px rgba(196,139,159,0.4);
  transition: all 0.3s ease;
}

.open-invitation:hover {
  transform: translateY(-5px) scale(1.05);
  box-shadow: 0 20px 45px rgba(196,139,159,0.6);
}

    @keyframes fadeInDown {
      0% { opacity: 0; transform: translateY(-50px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .invitation-names {
        font-size: 2rem;
      }
      .invitation-divider .amp {
        font-size: 1.5rem;
      }
      .invitation-date {
        font-size: 1rem;
      }
      .open-invitation {
        padding: 12px 35px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

<div class="invitation-card">
  <div class="invitation-content">
    <div class="invitation-names">Arjae</div>
    <div class="invitation-amp">&mdash; &amp; &mdash;</div>
    <div class="invitation-names">Thea</div>
    <div class="invitation-date">November 26, 2027</div>
    <a href="main.html" class="open-invitation">
      <i class="fa fa-envelope" style="margin-right: 8px;"></i> Open Invitation
    </a>
  </div>
</div>

  <!-- AOS Animation -->
  <script>
    AOS.init({ duration: 1200, once: true });
  </script>

</body>
